name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: bridge.exe
            cmd: bridge
          - goos: linux
            goarch: amd64
            binary: gpu-browser-linux-amd64
            cmd: gpu-browser
          - goos: darwin
            goarch: amd64
            binary: gpu-browser-darwin-amd64
            cmd: gpu-browser
          - goos: darwin
            goarch: arm64
            binary: gpu-browser-darwin-arm64
            cmd: gpu-browser
          - goos: linux
            goarch: arm64
            binary: gpu-browser-linux-arm64
            cmd: gpu-browser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/${{ matrix.cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --generate-notes ./*
