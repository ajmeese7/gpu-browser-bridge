name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build bridge (Windows)
        if: runner.os == 'Windows'
        run: go build -o bridge.exe ./cmd/bridge

      - name: Build CLI
        run: go build -o gpu-browser ./cmd/gpu-browser

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable

      # Headless E2E: drives the real bridge + Chrome over HTTP against local
      # pages, covering screenshot capture, eval, and cookie/header/localStorage
      # injection. The WebGPU-adapter check skips here (CI runners have no GPU).
      - name: E2E
        env:
          BRIDGE_CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: go test -tags e2e -v -timeout 180s ./internal/e2e
