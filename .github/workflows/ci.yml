name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build bridge (Windows)
        if: runner.os == 'Windows'
        run: go build -o bridge.exe ./cmd/bridge

      - name: Build CLI
        run: go build -o gpu-browser ./cmd/gpu-browser

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
